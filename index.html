<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SV Catalogue – a beautiful book catalogue manager with search, add, edit and delete features." />
  <title>SV Catalogue — Book Manager</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Feather Icons CDN -->
  <script src="https://unpkg.com/feather-icons"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Animated Background ── -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <i data-feather="book-open"></i>
        </div>
        <div class="brand-text">
          <span class="brand-name">SV Catalogue</span>
          <span class="brand-sub">Book Manager</span>
        </div>
      </div>
      <div class="header-stats" id="headerStats">
        <div class="stat-chip">
          <i data-feather="layers"></i>
          <span id="totalCount">0</span> Books
        </div>
        <div class="stat-chip latest-chip">
          <i data-feather="clock"></i>
          <span id="latestBook">—</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Main Layout ── -->
  <main class="main-layout">

    <!-- ── Left Panel: Controls ── -->
    <aside class="control-panel glass-card">

      <!-- Search -->
      <div class="panel-section">
        <h2 class="section-title"><i data-feather="search"></i> Search</h2>
        <div class="input-group">
          <input type="text" id="searchInput" placeholder="Search books…" class="input-field" autocomplete="off" />
          <button class="icon-btn clear-btn" id="clearSearch" title="Clear search">
            <i data-feather="x"></i>
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Add / Append Book -->
      <div class="panel-section">
        <h2 class="section-title"><i data-feather="plus-circle"></i> Add Book</h2>
        <div class="form-group">
          <label for="newBookTitle">Book Title</label>
          <input type="text" id="newBookTitle" placeholder="e.g. Clean Code" class="input-field" />
        </div>
        <button class="btn btn-primary" id="addBookBtn">
          <i data-feather="plus"></i> Append to Catalogue
        </button>
      </div>

      <div class="divider"></div>

      <!-- Insert at Position -->
      <div class="panel-section">
        <h2 class="section-title"><i data-feather="git-merge"></i> Insert at Position</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="insertTitle">Title</label>
            <input type="text" id="insertTitle" placeholder="Book name" class="input-field" />
          </div>
          <div class="form-group short">
            <label for="insertPos">Position</label>
            <input type="number" id="insertPos" placeholder="1" min="1" class="input-field" />
          </div>
        </div>
        <button class="btn btn-accent" id="insertBookBtn">
          <i data-feather="corner-down-right"></i> Insert at Position
        </button>
      </div>

      <div class="divider"></div>

      <!-- Danger Zone -->
      <div class="panel-section danger-zone">
        <h2 class="section-title"><i data-feather="alert-triangle"></i> Danger Zone</h2>
        <button class="btn btn-danger" id="clearAllBtn">
          <i data-feather="trash-2"></i> Clear Entire Catalogue
        </button>
      </div>

    </aside>

    <!-- ── Right Panel: Book List ── -->
    <section class="catalogue-panel">

      <div class="catalogue-header">
        <h1 class="catalogue-title">My Catalogue</h1>
        <div class="view-toggles">
          <button class="view-btn active" id="viewGrid" title="Grid view">
            <i data-feather="grid"></i>
          </button>
          <button class="view-btn" id="viewList" title="List view">
            <i data-feather="list"></i>
          </button>
        </div>
      </div>

      <!-- Toast Notification -->
      <div class="toast" id="toast">
        <i data-feather="check-circle"></i>
        <span id="toastMsg">Done!</span>
      </div>

      <!-- Book Cards -->
      <div class="book-grid" id="bookGrid">
        <!-- Filled by JS -->
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">📚</div>
        <h3>No books found</h3>
        <p>Add your first book using the panel on the left.</p>
      </div>

    </section>
  </main>

  <!-- ── Edit Modal ── -->
  <div class="modal-overlay hidden" id="editModal">
    <div class="modal glass-card">
      <div class="modal-header">
        <h3><i data-feather="edit-3"></i> Edit Book</h3>
        <button class="icon-btn" id="closeModal"><i data-feather="x"></i></button>
      </div>
      <div class="modal-body">
        <label for="editTitle">New Title</label>
        <input type="text" id="editTitle" class="input-field" placeholder="Enter new title" />
        <input type="hidden" id="editBookId" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelEdit">Cancel</button>
        <button class="btn btn-primary" id="saveEdit">
          <i data-feather="save"></i> Save Changes
        </button>
      </div>
    </div>
  </div>

  <!-- ── Confirm Modal ── -->
  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal glass-card">
      <div class="modal-header">
        <h3><i data-feather="alert-circle"></i> Confirm Action</h3>
        <button class="icon-btn" id="closeConfirm"><i data-feather="x"></i></button>
      </div>
      <div class="modal-body">
        <p id="confirmMsg">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelConfirm">Cancel</button>
        <button class="btn btn-danger" id="okConfirm">
          <i data-feather="trash-2"></i> Yes, Proceed
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
